<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M-F Property Management</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f2f2f2;
            color: #333;
        }
        .header {
            background-color: #1F3E63;
            color: white;
            padding: 20px;
            text-align: center;
        }
        .logo {
            max-width: 150px;
            margin-bottom: 20px;
        }
        .tagline {
            font-size: 1.5em;
            margin-bottom: 20px;
        }
        .buttons {
            margin-top: 20px;
        }
        .button {
            background-color: #E46A3A;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 5px;
            margin: 5px;
            transition: background-color 0.3s;
        }
        .button:hover {
            background-color: #3AA6D1;
        }
    </style>
</head>
<body>
    <div class="header">
        <img src="logo.png" alt="M-F Property Management Logo" class="logo"><!-- Placeholder for logo -->
        <h1>M-F Property Management</h1>
        <p class="tagline">Property Management You Can Trust</p>
        <div class="buttons">
            <a href="https://m-f-properties.managebuilding.com/Resident/public/home" class="button">Tenant Portal</a>
            <a href="https://m-f-properties.managebuilding.com/manager/public/authentication/login" class="button">Owner Portal</a>
        </div>
    </div>
</body>
</html>

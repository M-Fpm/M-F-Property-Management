<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M-F Property Management</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; }
        .hero { background-color: #1F3E63; color: white; padding: 50px; text-align: center; }
        .navigation { background-color: #E46A3A; padding: 10px; text-align: center; }
        .card { border: 1px solid #ccc; border-radius: 8px; margin: 15px; padding: 20px; width: 200px; display: inline-block; }
        .button { background-color: #3AA6D1; color: white; padding: 10px; border: none; border-radius: 5px; cursor: pointer; text-decoration: none; }
    </style>
</head>
<body>
    <div class="hero">
        <h1>M-F Property Management</h1>
        <p>Property Management You Can Trust</p>
    </div>
    <div class="navigation">
        <a href="#" class="button">Home</a>
        <a href="#" class="button">About</a>
        <a href="#" class="button">Contact</a>
    </div>
    <div class="search-filters">
        <h2>Property Search</h2>
        <input type="text" placeholder="Location" />
        <select>
            <option value="">Select Property Type</option>
            <option value="apartment">Apartment</option>
            <option value="condo">Condo</option>
            <option value="house">House</option>
        </select>
        <button class="button">Search</button>
    </div>
    <div class="property-list">
        <h2>Available Properties</h2>
        <div class="card">
            <h3>Property 1</h3>
            <p>Description of Property 1</p>
            <a href="#" class="button">View Details</a>
        </div>
        <div class="card">
            <h3>Property 2</h3>
            <p>Description of Property 2</p>
            <a href="#" class="button">View Details</a>
        </div>
        <!-- Add more properties as needed -->
    </div>
    <footer>
        <h2>Contact Us</h2>
        <p>Email: <a href="mailto:admin@m-fmanagement.ca">admin@m-fmanagement.ca</a></p>
        <a href="https://m-f-properties.managebuilding.com/Resident/public/home" class="button">Tenant Portal</a>
        <a href="https://m-f-properties.managebuilding.com/manager/public/authentication/login" class="button">Owner Portal</a>
    </footer>
</body>
</html>
